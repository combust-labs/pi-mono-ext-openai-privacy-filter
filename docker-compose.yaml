# Docker Compose for local OpenFGA development
# Usage: docker-compose up -d

services:
  openfga:
    image: openfga/openfga:latest
    container_name: pi-mono-privacy-filter-openfga
    ports:
      - "8080:8080"   # OpenFGA REST API
      - "3000:3000"   # OpenFGA Playground (optional)
    environment:
      OPENFGA_LOG_LEVEL: debug
      OPENFGA_STORE_DATA_DIR: /var/lib/openfga
      # Pre-create the default store on startup (optional)
      # OPENFGA_STORE_ID: privacy-policies
    volumes:
      - openfga_data:/var/lib/openfga
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  openfga_data:
    driver: local